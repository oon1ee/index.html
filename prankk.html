<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SYSTEM ERROR</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
}

/* ERROR */
.error {
    position: absolute;
    font-size: 12px;
    color: #00ff00;
    border: 1px solid #00ff00;
    padding: 6px;
    width: 220px;
}

/* FLASH */
.flash {
    animation: flash 0.2s infinite;
}
@keyframes flash {
    50% { filter: brightness(3); }
}

/* BUTTON */
.start-btn, .save-btn {
    position: fixed;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px;
    cursor: pointer;
    z-index: 999;
}

.start-btn {
    top: 40%;
    background: red;
    color: #00ff00;
}

.save-btn {
    top: 50%;
    background: black;
    color: red;
    border: 2px solid red;
    display: none;
}

/* LOADING */
#loadingScreen {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: red;
    font-size: 22px;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* LOVE */
.love {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

/* TEXT */
#text {
    color: red;
    text-align: center;
    font-size: 20px;
    max-width: 90%;
    word-break: break-word;
    animation: glowText 2s infinite alternate;
}

@keyframes glowText {
    from { text-shadow: 0 0 5px red; }
    to { text-shadow: 0 0 20px pink; }
}

/* HEART */
.heart-real {
    width: 250px;
    height: 230px;
    position: relative;
    overflow: hidden;
    animation: beat 1s infinite;
}

.heart-real img {
    width: 100%;
    height: 100%;
    object-fit: cover;

    -webkit-mask-image: url("https://upload.wikimedia.org/wikipedia/commons/3/35/Red_Heart.svg");
    -webkit-mask-size: cover;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;

    mask-image: url("https://upload.wikimedia.org/wikipedia/commons/3/35/Red_Heart.svg");
    mask-size: cover;
    mask-repeat: no-repeat;
    mask-position: center;

    filter: drop-shadow(0 0 20px pink);
}

/* SHINE */
.heart-real::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(120deg, transparent, white, transparent);
    transform: skewX(-20deg);
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { left: -100%; }
    100% { left: 200%; }
}

/* BEAT */
@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="start-btn" id="start">KLIK AKUU</div>
<div class="save-btn" id="save">⚠️ SELAMATKAN SISTEM ⚠️</div>

<div id="loadingScreen">
    RECOVERING SYSTEM... <span id="loadingText">0%</span>
</div>

<div class="love" id="love">
    <h1 id="text"></h1>

    <div class="heart-real">
        <img src="aikoooo.png">
    </div>

    <!-- tombol tambahan -->
    <button onclick="alert('BETEWEEE KAMUUU EROORR YAAA??, SOAALNYAAA SEETIAAAAP AKUU MIKIRIIN KAMUUU, HATII AKUU LANGSUUUNGG GAAA BISAAA BERFUUNGGSII IHIKKKK❤️')" 
    style="margin-top:20px; padding:10px; border:none; background:red; color:white; border-radius:10px;">
        KLIIKK DOOONGG
    </button>
</div>

<audio id="beepSound" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7c1b.mp3">
</audio>

<script>
let errorInterval;
let vibrateInterval;

function ketikText() {
    const text = "HAAAALLOOOOO SAAYAAAAANGGG, SEMAANGAAAAT YAAAAA BELAJAAAAARNYAAA, SEMOGAAAA KAMUUU DAPEEEET MEDAALIII YAAANG KAMUUU IMPIKAAAN ITUUU YAAAAA,TAAAPII KAALOOO CAPEEEE ISTIRAHAAAT DULUUU YAAAA SAYAAAAANGG, JANGAAAAN SAMPEEEEE KAAMUU SAAKIITT,I ALWAAYSSS LOVEEE YOUUUU ANDDD I LOVEEEE YOUUUU VEERRY VEERYYY MUUUCHHH💖";

    let i = 0;
    const target = document.getElementById("text");

    function ketik() {
        if (i < text.length) {
            target.innerHTML += text.charAt(i);
            i++;
            setTimeout(ketik, 40);
        }
    }

    ketik();
}

function createError() {
    const box = document.createElement("div");
    box.className = "error";

    box.style.top = Math.random()*window.innerHeight+"px";
    box.style.left = Math.random()*window.innerWidth+"px";

    box.innerHTML = `<pre>ERROR ${Math.floor(Math.random()*9999)}</pre>`;
    document.body.appendChild(box);
}

function fakeLoading(callback){
    const screen = document.getElementById("loadingScreen");
    const text = document.getElementById("loadingText");

    screen.style.display="flex";

    let p=0;
    let i=setInterval(()=>{
        p++;
        text.innerText=p+"%";

        if(p>=100){
            clearInterval(i);
            setTimeout(()=>{
                screen.style.display="none";
                callback();
            },800);
        }
    },25);
}

const start = document.getElementById("start");
const save = document.getElementById("save");
const love = document.getElementById("love");

start.onclick = () => {
    start.style.display = "none";
    document.body.classList.add("flash");

    document.getElementById("beepSound").play();

    errorInterval = setInterval(createError, 80);

    if (navigator.vibrate) {
        vibrateInterval = setInterval(() => {
            navigator.vibrate([80,50,80]);
        }, 300);
    }

    setTimeout(()=>{
        save.style.display="block";
    },1500);
};

save.onclick=()=>{
    clearInterval(errorInterval);
    clearInterval(vibrateInterval);

    document.body.classList.remove("flash");
    document.querySelectorAll(".error").forEach(e=>e.remove());

    save.style.display="none";

    fakeLoading(()=>{
        love.style.display="flex";
        ketikText();
    });
};
</script>

</body>
</html>
